name: Deploy to GitHub Pages

# Trigger on every push to main. Manual trigger also available
# via the Actions tab → "Run workflow".
on:
  push:
    branches: [main]
  workflow_dispatch:

# Required permissions for actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but don't cancel an in-progress one
# (let it finish so we don't ship a half-built site).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build (static export)
        env:
          # Repo is served at https://prizm-design.github.io/prizm/ — every
          # link, asset, and route needs this prefix. Local dev has no prefix.
          NEXT_BASE_PATH: /prizm
        run: pnpm build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
