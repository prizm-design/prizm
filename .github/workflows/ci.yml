name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version is read from package.json's `packageManager` field —
      # do NOT also specify `version` here; pnpm/action-setup errors when both are set.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Air-gap audit
        run: pnpm audit:airgap

      - name: Component audit (registry / API parity)
        run: pnpm audit:components

      - name: Internal link check
        run: pnpm check:links

      - name: Build (static export)
        run: pnpm build
